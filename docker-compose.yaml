services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:80"
      # - "443:443"
      # - "443:443/udp"
    volumes:
      - ./PWL_2026:/app
      - vendor:/app/vendor
    environment:
      - SERVER_NAME=:80
      - DB_HOST=${DB_HOST}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - DB_PORT=${DB_PORT}
    depends_on:
      - db

  db:
    image: mysql:latest
    restart: always
    ports: 
      - "63306:3306"
    environment:
        MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
        MYSQL_USER: '${DB_USERNAME}'
        MYSQL_PASSWORD: '${DB_PASSWORD}'
        MYSQL_DATABASE: '${DB_DATABASE}'
    volumes:
      - mdata:/var/lib/mysql

  bytebase:
    image: bytebase/bytebase:latest
    restart: always
    ports:
      - "5679:5678"
    command: ["--port", "5678", "--data", "/var/opt/bytebase"]
    volumes:
      - bytebase_data:/var/opt/bytebase
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=${DB_HOST}
      - PMA_USER=${DB_USER}
      - PMA_PASSWORD=${DB_PASSWORD}
      - PMA_DATABASE=${DB_DATABASE}
    depends_on:
      - db

volumes:
  mdata:
    driver: local
  bytebase_data:
    driver: local
  vendor:
    driver: local